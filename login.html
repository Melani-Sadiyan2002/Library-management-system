<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - LMS</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-container">
    <!-- LEFT -->
    <div class="auth-left">
      <div class="logo-icon">📖</div>
      <h2>Welcome Back to LMS</h2>
      <p>Access books easily. Borrow and return anytime.</p>
    </div>
    <!-- RIGHT -->
    <div class="auth-right">
      <div class="auth-card">
        <h3>Login</h3>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your Username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password"/>
        </div>
        <a href="#" class="forgot-link">Forgot Password ?</a>
        <button class="btn-primary" onclick="handleLogin()">Login</button>
        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Register</a>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="../js/app.js"></script>
<script>
  redirectIfLoggedIn();

  function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showToast('Please enter username and password.', 'error'); return;
    }

    const users = LMS.getUsers();
    const user = users.find(u => u.username === username && u.password === password);

    if (user) {
      LMS.setUser(user);
      showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    } else {
      showToast('Invalid username or password.', 'error');
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
