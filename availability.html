<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Availability - LMS</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <h1>Book Availability</h1>
      <div class="topbar-user">
        <span class="user-icon">👤</span>
        <span id="username-display"></span>
      </div>
    </div>

    <table class="availability-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Category</th>
          <th>Total Copies</th>
          <th>Available</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="availability-body"></tbody>
    </table>
  </main>
</div>
<div id="toast" class="toast"></div>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
  requireAuth();
  renderSidebar('availability.html');
  const user = LMS.getUser();
  document.getElementById('username-display').textContent = user.fullname;

  const tbody = document.getElementById('availability-body');
  tbody.innerHTML = LMS.books.map(b => `
    <tr>
      <td class="title-cell" style="display:flex;align-items:center;gap:10px;">
        <img src="${b.img}" alt="${b.title}" style="width:36px;height:46px;object-fit:cover;border-radius:4px;" onerror="this.src='https://via.placeholder.com/36x46?text=B'"/>
        <strong>${b.title}</strong>
      </td>
      <td>${b.author}</td>
      <td><span class="category-badge">${b.category}</span></td>
      <td>${b.total}</td>
      <td class="${b.available > 0 ? 'available-count' : 'status-out'}">${b.available}</td>
      <td class="${b.available > 0 ? 'status-available' : 'status-out'}">${b.available > 0 ? 'Available' : 'Out of Stock'}</td>
    </tr>
  `).join('');
</script>
</body>
</html>
