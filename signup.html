<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup - LMS</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-container">
    <!-- LEFT -->
    <div class="auth-left">
      <div class="logo-icon">📖</div>
      <h2>Join Our Community</h2>
      <p>Create your account and get instant access to thousands of books and resources.</p>
    </div>
    <!-- RIGHT -->
    <div class="auth-right">
      <div class="auth-card">
        <h3>Register Account</h3>
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="fullname" placeholder="Enter your full name"/>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a username"/>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="dob"/>
        </div>
        <div class="form-group">
          <label>NIC</label>
          <input type="text" id="nic" placeholder="Enter your NIC Number"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a password"/>
        </div>
        <div class="form-group">
          <label>NIC Upload</label>
          <label class="upload-box" for="nic-front">
            ⬇ Click to upload NIC Front
            <input type="file" id="nic-front" accept="image/*"/>
          </label>
          <label class="upload-box" for="nic-back">
            ⬇ Click to upload NIC Back
            <input type="file" id="nic-back" accept="image/*"/>
          </label>
        </div>
        <button class="btn-primary" onclick="handleSignup()">Register</button>
        <div class="auth-footer">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="../js/app.js"></script>
<script>
  redirectIfLoggedIn();

  // Show file name when selected
  document.getElementById('nic-front').addEventListener('change', function() {
    this.parentElement.textContent = '✅ ' + (this.files[0]?.name || 'NIC Front');
  });
  document.getElementById('nic-back').addEventListener('change', function() {
    this.parentElement.textContent = '✅ ' + (this.files[0]?.name || 'NIC Back');
  });

  function handleSignup() {
    const fullname = document.getElementById('fullname').value.trim();
    const username = document.getElementById('username').value.trim();
    const dob = document.getElementById('dob').value;
    const nic = document.getElementById('nic').value.trim();
    const password = document.getElementById('password').value;

    if (!fullname || !username || !dob || !nic || !password) {
      showToast('Please fill all fields.', 'error'); return;
    }

    const users = LMS.getUsers();
    if (users.find(u => u.username === username)) {
      showToast('Username already exists.', 'error'); return;
    }

    const user = { fullname, username, dob, nic, password };
    LMS.addUser(user);
    showToast('Account created! Please login.', 'success');
    setTimeout(() => { window.location.href = 'login.html'; }, 1200);
  }
</script>
</body>
</html>
